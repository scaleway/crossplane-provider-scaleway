apiVersion: object.scaleway.upbound.io/v1alpha1
kind: Configuration
metadata:
  annotations:
    meta.upbound.io/example-id: object/v1alpha1/configuration
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    bucketSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    region: fr-par
    rule:
    - applyServerSideEncryptionByDefault:
      - kmsMasterKeyId: my-kms-key
        sseAlgorithm: aws:kms
      bucketKeyEnabled: true

---

apiVersion: keymanager.scaleway.upbound.io/v1alpha1
kind: Key
metadata:
  annotations:
    meta.upbound.io/example-id: object/v1alpha1/configuration
  labels:
    testing.upbound.io/example-name: mykey
  name: mykey
spec:
  forProvider:
    algorithm: rsa_oaep_4096_sha256
    description: This key is used to encrypt bucket objects
    name: my-kms-key
    unprotected: "true"
    usage: asymmetric_encryption

---

apiVersion: object.scaleway.upbound.io/v1alpha1
kind: Bucket
metadata:
  annotations:
    meta.upbound.io/example-id: object/v1alpha1/configuration
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    name: my-bucket
    region: fr-par
