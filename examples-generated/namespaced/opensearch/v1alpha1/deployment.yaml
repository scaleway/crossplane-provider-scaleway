apiVersion: opensearch.scaleway.m.upbound.io/v1alpha1
kind: Deployment
metadata:
  annotations:
    meta.upbound.io/example-id: opensearch/v1alpha1/deployment
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: upbound-system
spec:
  forProvider:
    name: my-opensearch-cluster
    nodeAmount: 1
    nodeType: SEARCHDB-SHARED-2C-8G
    passwordSecretRef:
      key: example-key
      name: example-secret
    version: "2.0"
    volume:
    - sizeInGb: 5
      type: sbs_5k
