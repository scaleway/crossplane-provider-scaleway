apiVersion: iam.scaleway.m.upbound.io/v1alpha1
kind: Certificate
metadata:
  annotations:
    meta.upbound.io/example-id: iam/v1alpha1/certificate
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: upbound-system
spec:
  forProvider:
    content: <signing certificate generated by your Identity Provider>
    samlIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    type: signing

---

apiVersion: iam.scaleway.m.upbound.io/v1alpha1
kind: Saml
metadata:
  annotations:
    meta.upbound.io/example-id: iam/v1alpha1/certificate
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: upbound-system
spec:
  forProvider: {}
